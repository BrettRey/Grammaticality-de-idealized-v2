# Controlled vocabulary for conceptual DAGs.
# Keep node IDs stable. Add aliases instead of renaming when possible.

outcome_like:
  - id: reported_acceptability
    label: Reported acceptability
    definition: Overt binary, scalar, or comparative judgment elicited by a task.
    proxies:
      - magnitude-estimation score
      - Likert acceptability rating
      - forced-choice response
    forbidden_conflations:
      - grammaticality
      - community licensing
      - felt naturalness

  - id: grammaticality_attribution
    label: Grammaticality attribution
    definition: Speaker or analyst classification of a form as grammatical, ungrammatical, marginal, or otherwise grammar-relevant.
    proxies:
      - asterisk use
      - explicit metalinguistic classification
      - reviewer or teacher correction label
    forbidden_conflations:
      - underlying grammar
      - reported acceptability
      - theoretical grammaticality

  - id: analyst_category_assignment
    label: Analyst category assignment
    definition: Analyst, annotator, or trained-respondent classification of a form's category or constructional function.
    proxies:
      - grammar category label
      - annotation category
      - explicit category-classification response
    forbidden_conflations:
      - grammaticality attribution
      - community licensing
      - distributional category evidence

  - id: production_probability
    label: Production probability
    definition: Probability that a speaker or community produces a form in a specified context.
    proxies:
      - corpus frequency under opportunity normalization
      - elicited production frequency
      - conversational production rate
    forbidden_conflations:
      - usage frequency without opportunity normalization
      - acceptability
      - entrenchment

  - id: editorial_correction_probability
    label: Editorial or pedagogical correction probability
    definition: Probability that a form is corrected, marked, rejected, or reformulated by an institutional or pedagogical actor.
    proxies:
      - teacher correction rates
      - copy-editing changes
      - grammar-checker flags
    forbidden_conflations:
      - communicative failure
      - community licensing
      - grammatical impossibility

  - id: felt_naturalness_context
    label: Felt naturalness in context
    definition: Speaker's context-sensitive sense that a form feels ordinary, smooth, or usable.
    proxies:
      - naturalness ratings
      - response latencies
      - self-reported oddness
    forbidden_conflations:
      - grammaticality
      - reported acceptability
      - processing cost

  - id: community_licensing
    label: Community licensing
    definition: Degree to which a form is licensed in a specified speech community, register, situation, or genre.
    proxies:
      - opportunity-normalized attestation
      - community-specific judgments
      - repair and correction patterns
    forbidden_conflations:
      - standard-language ideology
      - raw frequency
      - individual preference

  - id: register_genre_appropriateness
    label: Register or genre appropriateness
    definition: Fit between a form and the situated register, genre, medium, or activity type.
    proxies:
      - framing-conditional judgment shift
      - genre-conditioned corpus distribution
      - style-guide treatment
    forbidden_conflations:
      - grammaticality
      - standardness
      - community licensing

  - id: repair_reformulation_pressure
    label: Repair or reformulation pressure
    definition: Pressure toward repair, repetition, clarification, correction, or alternative formulation.
    proxies:
      - conversational repair
      - editor rewrite
      - classroom correction
      - self-repair
    forbidden_conflations:
      - processing cost alone
      - grammaticality attribution
      - communicative failure alone

  - id: metalinguistic_condemnation
    label: Metalinguistic condemnation
    definition: Explicit rejection, stigma, or rule-based condemnation of a form.
    proxies:
      - usage-guide condemnation
      - social-media correction
      - teacher or editor comment
    forbidden_conflations:
      - unacceptability
      - impossibility
      - low frequency

  - id: reference_tracking_success
    label: Reference tracking success
    definition: Degree to which hearers or respondents identify and maintain the intended referent or antecedent relation.
    proxies:
      - antecedent-resolution accuracy
      - discourse referent tracking
      - comprehension response
      - repair outcome
    forbidden_conflations:
      - community licensing
      - grammaticality attribution
      - reported acceptability

upstream_or_mediating:
  - id: usage_frequency
    label: Usage frequency
    definition: Observed rate of a form in a domain before opportunity normalization.
    proxies:
      - corpus count
      - document frequency
      - token rate
    forbidden_conflations:
      - entrenchment
      - community licensing
      - conventionalization

  - id: opportunity_mass
    label: Opportunity mass
    definition: Quantity of contexts where a form could have appeared if licensed.
    proxies:
      - competitor contexts
      - paraphrase opportunity sets
      - syntactic environment counts
    forbidden_conflations:
      - raw frequency
      - production probability

  - id: opportunity_normalized_attestation
    label: Opportunity-normalized attestation
    definition: Attestation interpreted against the quantity and type of contexts where the form could have appeared.
    proxies:
      - corpus count divided by opportunity set
      - attestation rate in eligible environments
      - contrast between observed uses and available contexts
    forbidden_conflations:
      - raw frequency
      - opportunity mass alone
      - community licensing

  - id: competitor_availability
    label: Competitor availability
    definition: Availability of established alternative forms, repairs, paraphrases, or constructions in the same functional slot.
    proxies:
      - paraphrase availability
      - competing construction frequency
      - repair option count
    forbidden_conflations:
      - repair pressure
      - community licensing

  - id: preemption_strength
    label: Preemption strength
    definition: Degree to which available alternatives and high opportunity mass make absence or rarity probative against licensing.
    proxies:
      - opportunity-normalized absence with competitors present
      - competitor dominance in eligible contexts
      - repeated repair to a competitor construction
    forbidden_conflations:
      - raw absence
      - low frequency
      - ungrammaticality

  - id: entrenchment
    label: Entrenchment
    definition: Learned strength or accessibility of a form or construction from exposure and use.
    proxies:
      - priming effect
      - reaction-time facilitation
      - learning curve
      - persistence under exposure
    forbidden_conflations:
      - frequency
      - conventionalization
      - acceptability

  - id: processing_cost
    label: Processing cost
    definition: Cognitive difficulty of parsing, integrating, or repairing a form in context.
    proxies:
      - reading time
      - ERP profile
      - garden-path effect
      - memory-load manipulation
    forbidden_conflations:
      - ungrammaticality
      - semantic incoherence
      - low frequency

  - id: semantic_pragmatic_recoverability
    label: Semantic-pragmatic recoverability
    definition: Degree to which an intended meaning or discourse move can be recovered despite formal anomaly, rarity, or mismatch.
    proxies:
      - paraphrase success
      - comprehension accuracy
      - repair outcome
    forbidden_conflations:
      - grammaticality
      - acceptability
      - processing ease

  - id: repair_neighbour_distance
    label: Repair-neighbour distance
    definition: Distance or cost between the presented form and a plausible intended licensed form, repair, or nearby paraphrase.
    proxies:
      - minimal edit distance to repair
      - omitted or duplicated function word
      - nearby licensed paraphrase
      - noisy-channel reconstruction probability
    forbidden_conflations:
      - semantic recoverability
      - community licensing
      - reported acceptability

  - id: target_information_mass
    label: Target information mass
    definition: Amount of recoverable material, length, or information carried by the plausible intended target sentence or message.
    proxies:
      - target sentence length
      - token count
      - information content
      - recoverable proposition count
    forbidden_conflations:
      - processing cost
      - opportunity mass
      - community licensing

  - id: information_normalized_repair_distance
    label: Information-normalized repair distance
    definition: Repair-neighbour distance interpreted relative to the length or information mass of the intended target.
    proxies:
      - edit distance divided by target length
      - errors per recoverable unit
      - normalized Damerau-Levenshtein distance
    forbidden_conflations:
      - raw repair-neighbour distance
      - processing cost
      - grammaticality attribution

  - id: constructional_analogy
    label: Constructional analogy
    definition: Support from similar constructions, patterns, schemas, or distributional neighborhoods.
    proxies:
      - type frequency
      - analogical neighborhood density
      - productivity diagnostics
    forbidden_conflations:
      - token frequency
      - community licensing

  - id: distributional_category_evidence
    label: Distributional category evidence
    definition: Distributional facts used as evidence for a category or function analysis.
    proxies:
      - substitution class
      - complementation pattern
      - modifier or determiner distribution
      - positional diagnostics
    forbidden_conflations:
      - analyst category assignment
      - community licensing
      - grammaticality attribution

  - id: constructional_function
    label: Constructional function
    definition: Role a form fills inside a particular construction, such as modifier, complement, determiner-like role, fused head, or operator exponent.
    proxies:
      - local syntactic role
      - construction-specific distribution
      - dependency role
    forbidden_conflations:
      - lexical category
      - analyst category assignment
      - community licensing

  - id: constructional_frame_fit
    label: Constructional frame fit
    definition: Fit between a form-value relation and the active constructional, discourse, question-answer, or response-slot frame.
    proxies:
      - question-answer frame contrast
      - licensed paraphrase within same frame
      - response-slot substitution test
      - construction-specific repair pattern
    forbidden_conflations:
      - semantic recoverability
      - genre appropriateness
      - operator repertoire membership

  - id: payload_preposition_choice
    label: Payload preposition choice
    definition: Open or semi-open preposition choice contributing spatial, conceptual, or discourse content rather than a selected argument-linking value.
    proxies:
      - paraphrase-preserving PP alternation
      - spatial or conceptual construal contrast
      - open PP choice in ordinary prose
    forbidden_conflations:
      - argument-linking selection
      - operator value
      - collocational rigidity

  - id: collocational_rigidity
    label: Collocational rigidity
    definition: Stability or fixedness of a lexical co-occurrence pattern that need not itself supply an operator-like argument-linking value.
    proxies:
      - fixed expression frequency
      - restricted lexical co-occurrence
      - idiom or semi-idiom stability
    forbidden_conflations:
      - operator value
      - argument-linking selection
      - community licensing

  - id: argument_linking_selection
    label: Argument-linking selection
    definition: Selection of a preposition, complement type, or dependent form as part of a head or construction's participant-role, complement, or dependency-licensing pattern.
    proxies:
      - head-selected PP complement
      - complement-type alternation
      - role-assignment contrast
      - repair to selected complement form
    forbidden_conflations:
      - collocational rigidity
      - payload preposition choice
      - raw frequency

  - id: construction_specific_dependency_licensing
    label: Construction-specific dependency licensing
    definition: Licensing of a dependency configuration relative to a particular construction, discourse role, or update frame rather than as a global extraction rule.
    proxies:
      - wh-question vs relative-clause extraction contrast
      - no-extraction control interaction
      - construction-specific gap function
      - dependency repair pattern
    forbidden_conflations:
      - semantic recoverability
      - processing cost
      - global island ban

  - id: operator_value
    label: Operator value
    definition: Public-update value involving commitments, roles, scope, reference, dependency, repair, or discourse configuration.
    proxies:
      - clause typing
      - tense or agreement contrast
      - dependency licensing
      - repair asymmetry
    forbidden_conflations:
      - any form-meaning relation
      - payload semantics
      - indexical value

  - id: update_role_configuration
    label: Update-role configuration
    definition: Degree to which a form configures the move type, uptake role, response space, floor status, repair initiation, or commitment handling of an utterance.
    proxies:
      - response-space contrast
      - repair-initiation pattern
      - clause-type or force diagnostic
      - turn-management effect
    forbidden_conflations:
      - social consequence
      - semantic recoverability
      - operator repertoire membership

  - id: repertoire_closedness
    label: Repertoire closedness
    definition: Degree to which a form-value relation belongs to a restricted, recurrent, mutually accountable contrast set rather than an open or token-innovated class.
    proxies:
      - enumerable paradigm
      - mutually exclusive alternatives
      - stable distributional slot
      - resistance to free innovation
    forbidden_conflations:
      - frequency
      - familiarity
      - community licensing

  - id: token_innovability
    label: Token innovability
    definition: Degree to which a token can be stretched, repeated, blended, substituted, or newly coined without producing categorical licensing failure.
    proxies:
      - repeatability or stretchability
      - nonce-token tolerance
      - blended interjection use
      - improvisational substitution
    forbidden_conflations:
      - low conventionality
      - low production probability
      - social-indexical value

  - id: operator_repertoire_membership
    label: Operator repertoire membership
    definition: Degree to which a form-value relation belongs to a restricted repertoire of update-role contrasts rather than merely affecting uptake, stance, recognizability, or content.
    proxies:
      - closed update-role paradigm
      - obligatory or exclusionary selection context
      - repair targeting move type
      - contrastive clause-type or force behaviour
    forbidden_conflations:
      - update-role configuration alone
      - repertoire closedness alone
      - grammaticality attribution

  - id: pronoun_feature_alignment
    label: Pronoun feature alignment
    definition: Fit between a pronoun or pro-form's person, number, gender, animacy, case, or discourse-tracking features and the construed referent relation.
    proxies:
      - pronoun-antecedent feature match
      - agreement-feature manipulation
      - pro-form contrast
      - reference-tracking error pattern
    forbidden_conflations:
      - reference tracking success
      - personhood ascription
      - community licensing

  - id: personhood_ascription
    label: Personhood ascription
    definition: Contextual classification of a referent as person, non-person, animate, institutional entity, or socially accountable participant for purposes of pro-form choice.
    proxies:
      - personification contrast
      - human/non-human referent manipulation
      - institutional referent cue
      - named-person versus object contrast
    forbidden_conflations:
      - pronoun feature alignment
      - social-indexical value
      - grammaticality attribution

  - id: social_indexical_value
    label: Social-indexical value
    definition: Value by which a form indexes personae, groups, stances, identities, or social positions.
    proxies:
      - matched-guise effect
      - persona association
      - indexical-field mapping
    forbidden_conflations:
      - standard-language ideology
      - register fit
      - operator value

  - id: standard_language_ideology
    label: Standard-language ideology
    definition: Institutionalized belief that some forms are intrinsically correct, educated, logical, or proper.
    proxies:
      - usage-guide rule
      - school correction
      - editor preference
      - correctness framing effect
    forbidden_conflations:
      - community licensing
      - grammatical impossibility
      - communicative success

  - id: schooling_instructional_exposure
    label: Schooling or instructional exposure
    definition: Exposure to explicit instruction, correction, tests, editing norms, or standardized language ideology.
    proxies:
      - education history
      - editorial training
      - grammar-test exposure
    forbidden_conflations:
      - linguistic competence
      - community membership

  - id: genre
    label: Genre
    definition: Recognized text or interaction type with expectations for form, function, and stance.
    proxies:
      - register label
      - publication type
      - classroom or workplace task
    forbidden_conflations:
      - medium
      - standardness

  - id: medium
    label: Medium
    definition: Channel of production or reception, such as speech, writing, messaging, editing, or test response.
    proxies:
      - spoken transcript
      - edited prose
      - chat message
      - survey item
    forbidden_conflations:
      - genre
      - register

  - id: speaker_identity
    label: Speaker identity
    definition: Socially interpreted identity of the speaker or writer as cued or inferred in context.
    proxies:
      - matched-guise cue
      - dialect label
      - demographic cue
    forbidden_conflations:
      - competence
      - variety
      - authority

  - id: audience_design
    label: Audience design
    definition: Adaptation of form to anticipated audience, evaluator, interlocutor, or institution.
    proxies:
      - addressee manipulation
      - formal/informal audience cue
      - edit-for-reader task
    forbidden_conflations:
      - genre
      - standard-language ideology

  - id: diachronic_stabilization
    label: Diachronic stabilization
    definition: Historical process by which a form, gap, correction pattern, or evaluative association becomes stable over time.
    proxies:
      - time-series corpus trend
      - cohort difference
      - historical usage-guide trajectory
    forbidden_conflations:
      - synchronic acceptability
      - raw frequency trend

measurement:
  - id: measurement_task
    label: Measurement task
    definition: The elicitation procedure through which a response is collected.
    proxies:
      - acceptability survey
      - forced choice
      - magnitude estimation
      - production task
    forbidden_conflations:
      - target construct
      - channel

  - id: production_task_setting
    label: Production task setting
    definition: Setting in which production probability is observed, elicited, monitored, or left unmonitored.
    proxies:
      - elicited production prompt
      - unmonitored corpus context
      - conversation or messaging situation
      - monitored writing task
    forbidden_conflations:
      - judgment task setting
      - reported acceptability
      - community licensing

  - id: judgment_task_setting
    label: Judgment task setting
    definition: Setting in which acceptability, grammaticality, correction, category, or naturalness responses are elicited.
    proxies:
      - acceptability survey
      - grammar test
      - editing task
      - category-classification prompt
    forbidden_conflations:
      - production task setting
      - production probability
      - community licensing

  - id: task_framing
    label: Task framing
    definition: Explicit or implicit cue about what kind of response is being requested.
    proxies:
      - correctness wording
      - naturalness wording
      - register cue
      - speaker-cue manipulation
    forbidden_conflations:
      - standard-language ideology
      - genre
